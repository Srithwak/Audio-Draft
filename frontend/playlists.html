<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio-Draft2 — Playlists">
    <title>Playlists — Audio-Draft2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-content { max-width: 1100px; }

        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .playlist-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .playlist-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-purple);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .playlist-card__img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background: rgba(255,255,255,0.03);
            display: block;
        }

        .playlist-card__body { padding: 16px; }

        .playlist-card__title {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .playlist-card__meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Track detail panel */
        .track-panel {
            position: fixed;
            top: 0; right: -480px;
            width: 480px;
            height: 100vh;
            background: var(--bg-primary);
            border-left: 1px solid var(--border-color);
            z-index: 200;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 32px rgba(0,0,0,0.4);
        }

        .track-panel.open { right: 0; }

        .track-panel__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .track-panel__title {
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-panel__close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        .track-panel__close:hover { color: var(--text-primary); }

        .track-panel__list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            transition: background 0.15s;
        }

        .track-item:hover { background: rgba(255,255,255,0.03); }

        .track-item__img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }

        .track-item__info { flex: 1; min-width: 0; }

        .track-item__name {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item__artist {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item__duration {
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }

        .overlay.open { display: block; }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .empty-state h3 { margin-bottom: 8px; color: var(--text-primary); }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent-purple)" stroke-width="2" />
                    <circle cx="24" cy="24" r="10" fill="var(--accent-purple)" />
                </svg>
                Audio-Draft2
            </div>
            <nav class="sidebar__nav">
                <a href="dashboard.html" class="sidebar__link">Dashboard</a>
                <a href="social.html" class="sidebar__link">Social</a>
                <a href="playlists.html" class="sidebar__link active">Playlists</a>
                <a href="analytics.html" class="sidebar__link">Analytics</a>
                <a href="settings.html" class="sidebar__link">Settings</a>
            </nav>
            <div class="sidebar__footer">
                <div class="user-info">
                    <div class="user-avatar" id="nav-avatar">?</div>
                    <div><div style="font-weight: 600;" id="nav-username">Loading...</div></div>
                </div>
                <button class="btn btn--dark" id="logout-btn" style="width: 100%; margin-top: 12px;">Sign Out</button>
            </div>
        </aside>

        <main class="main-view">
            <header class="topbar">
                <div class="topbar__title">Playlists</div>
                <div class="topbar__actions">
                    <a href="notifications.html" class="btn btn--dark">Notifications <span id="notif-badge"
                            style="background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.8rem; margin-left: 4px; display: none;">0</span></a>
                </div>
            </header>

            <div class="page-content">
                <div>
                    <h1 style="font-size: 2rem; margin-bottom: 8px;">Your Playlists</h1>
                    <p style="color: var(--text-secondary);">Your Spotify library.</p>
                </div>

                <div class="playlist-grid" id="playlists-container">
                    <div class="empty-state">
                        <h3>Loading playlists...</h3>
                        <p>Fetching your Spotify library.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Slide-out track panel -->
    <div class="overlay" id="track-overlay"></div>
    <div class="track-panel" id="track-panel">
        <div class="track-panel__header">
            <div class="track-panel__title" id="panel-playlist-name">Playlist</div>
            <button class="track-panel__close" id="close-panel">&times;</button>
        </div>
        <div class="track-panel__list" id="panel-track-list">
            <div style="text-align: center; padding: 32px; color: var(--text-secondary);">Select a playlist to view tracks.</div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadSpotifyPlaylists();

            const panel = document.getElementById("track-panel");
            const overlay = document.getElementById("track-overlay");
            const closeBtn = document.getElementById("close-panel");

            function closePanel() {
                panel.classList.remove("open");
                overlay.classList.remove("open");
            }

            closeBtn.addEventListener("click", closePanel);
            overlay.addEventListener("click", closePanel);
        });

        async function loadSpotifyPlaylists() {
            const container = document.getElementById("playlists-container");
            try {
                const res = await apiFetch("/api/spotify/playlists");
                if (!res.ok) {
                    const err = await res.json();
                    container.innerHTML = `<div class="empty-state"><h3>Connect Spotify</h3><p>${err.error || 'Go to Settings to connect your Spotify account.'}</p></div>`;
                    return;
                }
                const data = await res.json();
                if (!data.playlists || data.playlists.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>No Playlists</h3><p>You don\'t have any playlists on Spotify yet.</p></div>';
                    return;
                }

                container.innerHTML = data.playlists.map(pl => {
                    const imgHtml = pl.image
                        ? `<img class="playlist-card__img" src="${pl.image}" alt="${pl.name}">`
                        : `<div class="playlist-card__img" style="display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-secondary);">🎵</div>`;
                    return `
                    <div class="playlist-card" data-id="${pl.id}" data-name="${pl.name}">
                        ${imgHtml}
                        <div class="playlist-card__body">
                            <div class="playlist-card__title">${pl.name}</div>
                            <div class="playlist-card__meta">${pl.track_count} tracks · ${pl.owner}</div>
                        </div>
                    </div>`;
                }).join('');

                // Click handlers
                document.querySelectorAll(".playlist-card").forEach(card => {
                    card.addEventListener("click", () => {
                        const id = card.dataset.id;
                        const name = card.dataset.name;
                        openPlaylistPanel(id, name);
                    });
                });
            } catch (err) {
                container.innerHTML = '<div class="empty-state"><h3>Error</h3><p>Failed to load playlists.</p></div>';
            }
        }

        async function openPlaylistPanel(playlistId, playlistName) {
            const panel = document.getElementById("track-panel");
            const overlay = document.getElementById("track-overlay");
            const nameEl = document.getElementById("panel-playlist-name");
            const listEl = document.getElementById("panel-track-list");

            nameEl.textContent = playlistName;
            listEl.innerHTML = '<div style="text-align: center; padding: 32px; color: var(--text-secondary);">Loading tracks...</div>';
            panel.classList.add("open");
            overlay.classList.add("open");

            try {
                const res = await apiFetch(`/api/spotify/playlists/${playlistId}/tracks`);
                const data = await res.json();

                if (!data.tracks || data.tracks.length === 0) {
                    listEl.innerHTML = '<div style="text-align: center; padding: 32px; color: var(--text-secondary);">This playlist is empty.</div>';
                    return;
                }

                listEl.innerHTML = data.tracks.map(t => {
                    const mins = Math.floor((t.duration_ms || 0) / 60000);
                    const secs = Math.floor(((t.duration_ms || 0) % 60000) / 1000).toString().padStart(2, '0');
                    const imgHtml = t.image
                        ? `<img class="track-item__img" src="${t.image}" alt="">`
                        : `<div class="track-item__img"></div>`;
                    return `
                    <div class="track-item">
                        ${imgHtml}
                        <div class="track-item__info">
                            <div class="track-item__name">${t.name}</div>
                            <div class="track-item__artist">${t.artist}</div>
                        </div>
                        <div class="track-item__duration">${mins}:${secs}</div>
                    </div>`;
                }).join('');
            } catch (err) {
                listEl.innerHTML = '<div style="text-align: center; padding: 32px; color: var(--text-secondary);">Failed to load tracks.</div>';
            }
        }
    </script>
</body>

</html>
