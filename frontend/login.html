<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio-Draft — Music Discovery Platform">
    <title>Sign In — Audio-Draft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="main-content">
        <div class="auth-split">
            <div class="auth-brand">
                <div class="auth-brand__mesh"></div>
                <div class="auth-brand__content">
                    <div class="auth-brand__logo">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="22" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
                            <circle cx="24" cy="24" r="10" fill="rgba(255,255,255,0.9)" />
                            <circle cx="24" cy="24" r="4" fill="#0f172a" />
                        </svg>
                    </div>
                    <h2 class="auth-brand__name">Audio-Draft</h2>
                    <p class="auth-brand__tagline">Your music. Your insights.<br>All in one place.</p>
                    <div class="auth-brand__bars" aria-hidden="true">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </div>
                </div>
            </div>

            <div class="auth-form-panel">
                <div class="auth-form-panel__inner">
                    <div class="auth-form-panel__header">
                        <h1 class="auth-form-panel__title">Welcome back</h1>
                        <p class="auth-form-panel__subtitle">Sign in to continue to your dashboard</p>
                    </div>
                    <form method="POST" action="dashboard.html" class="auth-form" id="login-form" novalidate>
                        <div class="form-group" id="login-email-group">
                            <label for="email" class="form-label form-label--dark">Email</label>
                            <input type="email" name="email" class="form-input form-input--light" id="email"
                                placeholder="you@example.com" autocomplete="email" required>
                        </div>
                        <div class="form-group" id="login-password-group">
                            <label for="password" class="form-label form-label--dark">Password</label>
                            <input type="password" name="password" class="form-input form-input--light" id="password"
                                placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn--dark btn--full" id="login-submit">
                            Sign In
                        </button>
                    </form>
                    <div class="auth-form-panel__footer">
                        <p>Don't have an account? <a href="register.html" class="auth-link--dark" id="goto-register">Create one</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/main.js"></script>
</body>

</html>
