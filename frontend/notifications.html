<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio-Draft2 — Notifications">
    <title>Notifications — Audio-Draft2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .layout {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }

        .sidebar {
            width: 250px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }

        .sidebar__logo {
            padding: 0 24px 32px 24px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar__nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar__link {
            padding: 12px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar__link:hover,
        .sidebar__link.active {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .sidebar__link.active {
            border-right: 3px solid var(--accent-purple);
        }

        .sidebar__footer {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            height: 72px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background-color: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-content {
            padding: 48px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notification-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .notification-card.unread {
            border-left: 4px solid var(--accent-purple);
            background-color: rgba(167, 139, 250, 0.05);
        }

        .notification-card__content h3 {
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        .notification-card__content p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .notification-card__time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar__logo">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent-purple)" stroke-width="2" />
                    <circle cx="24" cy="24" r="10" fill="var(--accent-purple)" />
                </svg>
                Audio-Draft2
            </div>

            <nav class="sidebar__nav">
                <a href="dashboard.html" class="sidebar__link">Dashboard</a>
                <a href="social.html" class="sidebar__link">Social</a>
                <a href="playlists.html" class="sidebar__link">Playlists</a>
                <a href="analytics.html" class="sidebar__link">Analytics</a>
                <a href="settings.html" class="sidebar__link">Settings</a>
            </nav>

            <div class="sidebar__footer">
                <div class="user-info">
                    <div class="user-avatar" id="nav-avatar">?</div>
                    <div>
                        <div style="font-weight: 600;" id="nav-username">Loading...</div>
                    </div>
                </div>
                <button class="btn btn--dark" id="logout-btn" style="width: 100%; margin-top: 12px;">Sign Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-view">
            <header class="topbar">
                <div class="topbar__title">Notifications</div>
                <div class="topbar__actions">
                    <a href="notifications.html" class="btn btn--dark">Notifications <span id="notif-badge"
                            style="background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.8rem; margin-left: 4px; display: none;">0</span></a>
                </div>
            </header>

            <div class="page-content">
                <div class="dashboard-header"
                    style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
                    <div>
                        <h1 style="font-size: 2rem; margin-bottom: 8px;">Activity</h1>
                        <p style="color: var(--text-secondary);">Updates and playlist invitations from your network.</p>
                    </div>
                    <button class="btn btn--dark" id="mark-all-btn">Mark all as read</button>
                </div>

                <div class="notification-list" id="notifications-container">
                    <!-- Notifications JS injected here -->
                    <div class="notification-card" style="justify-content: center; color: var(--text-secondary);">
                        Loading notifications...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadNotifications();

            const markAllBtn = document.getElementById("mark-all-btn");
            if (markAllBtn) {
                markAllBtn.addEventListener("click", async () => {
                    const unreadBtns = document.querySelectorAll(".mark-read-btn");
                    unreadBtns.forEach(btn => btn.click());
                });
            }
        });

        async function loadNotifications() {
            const container = document.getElementById("notifications-container");
            const badge = document.getElementById("notif-badge");

            try {
                const res = await apiFetch("/api/notifications");
                const data = await res.json();

                if (res.ok) {
                    container.innerHTML = '';
                    if (data.notifications.length === 0) {
                        container.innerHTML = '<div class="notification-card" style="justify-content: center; color: var(--text-secondary);">You have no notifications.</div>';
                        if (badge) badge.style.display = 'none';
                        return;
                    }

                    let unreadCount = 0;

                    data.notifications.forEach(notif => {
                        if (!notif.is_read) unreadCount++;

                        const dateStr = new Date(notif.created_at).toLocaleString();

                        const card = document.createElement("div");
                        card.className = `notification-card ${notif.is_read ? '' : 'unread'}`;
                        card.innerHTML = `
                            <div class="notification-card__content">
                                <h3>${notif.type}</h3>
                                <p>${notif.message}</p>
                                <span class="notification-card__time">${dateStr}</span>
                            </div>
                            <div class="notification-card__actions">
                                ${!notif.is_read ? `<button class="btn btn--dark mark-read-btn" data-id="${notif.notification_id}">Mark Read</button>` : ''}
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    // Update global badge
                    if (badge) {
                        if (unreadCount > 0) {
                            badge.textContent = unreadCount;
                            badge.style.display = 'inline-block';
                        } else {
                            badge.style.display = 'none';
                        }
                    }

                    // Attach read handlers
                    document.querySelectorAll(".mark-read-btn").forEach(btn => {
                        btn.addEventListener("click", async (e) => {
                            const notifId = e.target.getAttribute("data-id");
                            e.target.disabled = true;
                            e.target.textContent = "...";
                            await apiFetch(`/api/notifications/${notifId}/read`, { method: 'POST' });
                            loadNotifications();
                        });
                    });
                }
            } catch (err) {
                container.innerHTML = '<div class="notification-card" style="justify-content: center; color: var(--text-secondary);">Failed to load notifications.</div>';
            }
        }
    </script>
</body>

</html>
