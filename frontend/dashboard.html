<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio-Draft2 — Dashboard">
    <title>Dashboard — Audio-Draft2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-header { margin-bottom: 32px; }
        .dashboard-header h1 { font-size: 2rem; margin-bottom: 8px; }
        .dashboard-header p { color: var(--text-secondary); }

        .now-playing-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background: linear-gradient(135deg, rgba(167,139,250,0.08), rgba(59,130,246,0.05));
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            animation: fadeIn 0.5s ease-out;
        }

        .now-playing-card__art {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .now-playing-card__info { flex: 1; min-width: 0; }

        .now-playing-card__title {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-card__artist {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .now-playing-card__album {
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 2px;
        }

        .now-playing-card__device {
            font-size: 0.75rem;
            color: var(--accent-purple);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-track__fill {
            height: 100%;
            background: var(--accent-purple);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .now-playing-card__time {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-secondary);
        }

        .empty-state__icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { margin-bottom: 8px; color: var(--text-primary); }

        .playing-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(74,222,128,0.15);
            color: #4ade80;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .playing-badge__dot {
            width: 6px; height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent-purple)" stroke-width="2" />
                    <circle cx="24" cy="24" r="10" fill="var(--accent-purple)" />
                </svg>
                Audio-Draft2
            </div>
            <nav class="sidebar__nav">
                <a href="dashboard.html" class="sidebar__link active">Dashboard</a>
                <a href="social.html" class="sidebar__link">Social</a>
                <a href="playlists.html" class="sidebar__link">Playlists</a>
                <a href="analytics.html" class="sidebar__link">Analytics</a>
                <a href="settings.html" class="sidebar__link">Settings</a>
            </nav>
            <div class="sidebar__footer">
                <div class="user-info">
                    <div class="user-avatar" id="nav-avatar">?</div>
                    <div><div style="font-weight: 600;" id="nav-username">Loading...</div></div>
                </div>
                <button class="btn btn--dark" id="logout-btn" style="width: 100%; margin-top: 12px;">Sign Out</button>
            </div>
        </aside>

        <main class="main-view">
            <header class="topbar">
                <div class="topbar__title">Dashboard</div>
                <div class="topbar__actions">
                    <a href="notifications.html" class="btn btn--dark">Notifications <span id="notif-badge"
                            style="background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.8rem; margin-left: 4px; display: none;">0</span></a>
                </div>
            </header>

            <div class="page-content">
                <div class="dashboard-header">
                    <h1 id="welcome-msg">Welcome back</h1>
                    <p>Here's what's playing right now.</p>
                </div>

                <div id="now-playing-container">
                    <div class="empty-state">
                        <div class="empty-state__icon">🎧</div>
                        <h3>Checking Spotify...</h3>
                        <p>Loading your current playback.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
