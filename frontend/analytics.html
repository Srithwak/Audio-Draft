<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Audio-Draft — Profile Analytics">
    <title>Analytics — Audio-Draft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-content {
            max-width: 1200px;
        }

        .timeframe-selector {
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 32px;
            align-self: flex-start;
        }

        .timeframe-btn {
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .timeframe-btn:hover {
            color: var(--text-primary);
        }

        .timeframe-btn.active {
            background: var(--bg-hover);
            color: var(--accent-purple);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .analytics-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .analytics-card--full {
            grid-column: span 2;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 20px 0;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8rem;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .ranking-rank {
            width: 24px;
            font-weight: 700;
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .ranking-img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .ranking-img--round {
            border-radius: 50%;
        }

        .ranking-info {
            flex: 1;
            min-width: 0;
        }

        .ranking-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ranking-sub {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .genre-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(167, 139, 250, 0.1);
            color: var(--accent-purple);
            margin-right: 4px;
            margin-top: 4px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: center;
        }

        .stat-card__label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .stat-card__value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-card--accent .stat-card__value {
            color: var(--accent-purple);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent-purple)" stroke-width="2" />
                    <circle cx="24" cy="24" r="10" fill="var(--accent-purple)" />
                </svg>
                Audio-Draft
            </div>
            <nav class="sidebar__nav">
                <a href="dashboard.html" class="sidebar__link">Dashboard</a>
                <a href="social.html" class="sidebar__link">Social</a>
                <a href="playlists.html" class="sidebar__link">Playlists</a>
                <a href="discover.html" class="sidebar__link">Discover</a>
                <a href="analytics.html" class="sidebar__link active">Analytics</a>
                <a href="settings.html" class="sidebar__link">Settings</a>
            </nav>
            <div class="sidebar__footer">
                <div class="user-info">
                    <div class="user-avatar" id="nav-avatar">?</div>
                    <div>
                        <div style="font-weight: 600;" id="nav-username">Loading...</div>
                    </div>
                </div>
                <button class="btn btn--dark" id="logout-btn" style="width: 100%; margin-top: 12px;">Sign Out</button>
            </div>
        </aside>

        <main class="main-view">
            <header class="topbar">
                <div class="topbar__title">Analytics</div>
                <div class="topbar__actions">
                    <span id="spotify-sync-status"
                        style="font-size: 0.8rem; color: var(--text-secondary);">Loading...</span>
                </div>
            </header>

            <div class="page-content">


                <!-- NEW: Profile Analytics Section -->
                <div class="stats-row" id="profile-stats">
                    <div class="stat-card">
                        <div class="stat-card__label">Generated Playlists</div>
                        <div class="stat-card__value" id="stat-playlists">...</div>
                    </div>
                    <div class="stat-card stat-card--accent">
                        <div class="stat-card__label">Reviews & Ratings</div>
                        <div class="stat-card__value" id="stat-reviews">...</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__label">Friends</div>
                        <div class="stat-card__value" id="stat-friends">...</div>
                    </div>
                </div>
                <div class="stats-row" id="profile-stats-2">
                    <div class="stat-card">
                        <div class="stat-card__label">Avg Rating Given</div>
                        <div class="stat-card__value" id="stat-avg-rating">...</div>
                    </div>
                    <div class="stat-card stat-card--accent">
                        <div class="stat-card__label">Spotify Exports</div>
                        <div class="stat-card__value" id="stat-exports">...</div>
                    </div>
                </div>

                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-time="short_term">Last 4 Weeks</button>
                    <button class="timeframe-btn" data-time="medium_term">Last 6 Months</button>
                    <button class="timeframe-btn" data-time="long_term">All Time</button>
                </div>

                <div class="analytics-grid">
                    <div class="analytics-card">
                        <h2 class="card-title">Top Artists</h2>
                        <div id="top-artists-list" class="ranking-list">
                            <p class="text-muted">Loading...</p>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <h2 class="card-title">Top Tracks</h2>
                        <div id="top-tracks-list" class="ranking-list">
                            <p class="text-muted">Loading...</p>
                        </div>
                    </div>

                    <div class="analytics-card analytics-card--full">
                        <h2 class="card-title">Recently Played</h2>
                        <div id="recent-tracks-list" class="ranking-list">
                            <p class="text-muted">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
